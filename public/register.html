<!DOCTYPE html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Register - PT SAHABAT JAYA SUKSES</title>
    <link rel="stylesheet" href="/style.css" />
    <script src="https://accounts.google.com/gsi/client" async></script>
  </head>
  <body>
    <header class="topbar">
      <a class="brand" href="/">
        <img id="brandLogo" class="brand-logo hidden" alt="Logo" />
        <span class="brand-text">
          <h1>PT SAHABAT JAYA SUKSES</h1>
          <p>Daftar akun baru</p>
        </span>
      </a>
      <div class="top-actions">
        <img id="topLogo" class="top-logo hidden" alt="Logo" />
      </div>
    </header>

    <main class="container">
      <section class="auth-card">
        <h2>Register</h2>
        <form id="registerForm" class="auth-form" autocomplete="off">
          <div>
            <label for="name" style="font-size:0.9rem; font-weight:500;">Nama Lengkap <span style="color:var(--danger)">*</span></label>
            <input type="text" id="name" placeholder="Masukkan nama lengkap Anda" required autocomplete="new-password" style="margin-top:4px; width:100%; box-sizing:border-box;" />
          </div>
          <div>
            <label for="email" style="font-size:0.9rem; font-weight:500;">Email <span style="color:var(--danger)">*</span></label>
            <input type="email" id="email" placeholder="contoh@email.com" required autocomplete="new-password" style="margin-top:4px; width:100%; box-sizing:border-box;" />
          </div>
          <div>
            <label for="password" style="font-size:0.9rem; font-weight:500;">Password <span style="color:var(--danger)">*</span></label>
            <input
              type="password"
              id="password"
              placeholder="Minimal 6 karakter"
              minlength="6"
              required
              autocomplete="new-password"
              style="margin-top:4px; width:100%; box-sizing:border-box;"
            />
          </div>
          <button type="submit" class="btn-primary" style="margin-top:8px;">Daftar</button>
        </form>
        <div id="googleSignInBtn" style="margin-top: 16px; display: flex; justify-content: center;"></div>
        <p id="message" class="message"></p>
        <a class="auth-link" href="/login.html">Sudah punya akun? Login</a>
      </section>
    </main>

    <script src="/common.js"></script>
    <script src="/register.js"></script>
  </body>
</html>
