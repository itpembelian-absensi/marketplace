name: Deploy to Self-Hosted

on:
  push:
    branches:
      - main

jobs:
  deploy:
    # Runner di server harus punya label: self-hosted + marketplace
    runs-on: [self-hosted, marketplace]

    defaults:
      run:
        working-directory: /srv/docker/marketplace

    steps:
      - name: Make scripts executable
        run: chmod +x ./deploy.sh ./scripts/*.sh

      - name: Run Deployment
        env:
          BRANCH: ${{ github.ref_name }}
          GIT_SHA: ${{ github.sha }}
        run: ./deploy.sh
